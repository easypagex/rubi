<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>😚 Ivan & Rubi</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f5f2ee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    padding: 2rem 1rem;
  }

  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    max-width: 420px;
    width: 100%;
  }

  .photo-wrap {
    position: relative;
    width: 320px;
    height: 320px;
    cursor: pointer;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 6px 40px rgba(0,0,0,0.13);
    transition: box-shadow 0.2s ease;
    flex-shrink: 0;
  }

  .photo-wrap:hover {
    box-shadow: 0 10px 56px rgba(0,0,0,0.2);
  }

  .photo-wrap:active {
    transform: scale(0.98);
  }

  .photo-wrap img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    transition: opacity 0.35s ease;
    user-select: none;
    pointer-events: none;
  }

  #img1 { opacity: 1; }
  #img2 { opacity: 0; }

  .phrase-bubble {
    background: #1a1a1a;
    color: #f0ece6;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    font-weight: 300;
    font-style: italic;
    line-height: 1.55;
    padding: 1.1rem 1.5rem;
    border-radius: 0 0 2rem 2rem;
    text-align: center;
    max-width: 320px;
    width: 320px;
    min-height: 4.5rem;
    position: relative;
    transition: opacity 0.4s ease;
    letter-spacing: 0.01em;
  }

  .phrase-bubble::before {
    content: '\201C';
    font-family: 'Syne', sans-serif;
    font-size: 3rem;
    color: #ffffff22;
    position: absolute;
    top: -0.3rem;
    left: 0.9rem;
    line-height: 1;
    pointer-events: none;
  }

  .hint {
    margin-top: 1.4rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #aaa;
  }

  @keyframes fadePhrase {
    0% { opacity: 0; transform: translateY(4px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .phrase-in { animation: fadePhrase 0.5s ease forwards; }

  @media (prefers-reduced-motion: reduce) {
    .photo-wrap img, .phrase-bubble { transition: none; }
    .phrase-in { animation: none; }
  }
</style>
</head>

let isImg2 = false;
let lastIndex = -1;

function pickPhrase() {
  let idx;
  do { idx = Math.floor(Math.random() * phrases.length); } while (idx === lastIndex);
  lastIndex = idx;
  return phrases[idx];
}

function showPhrase() {
  const el = document.getElementById('phrase');
  el.classList.remove('phrase-in');
  void el.offsetWidth;
  el.textContent = pickPhrase();
  el.classList.add('phrase-in');
}

// Mac chime: D-major-ish chord using C major tones: C4, E4, G4, C5
function playMacChime() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const master = ctx.createGain();
  master.gain.setValueAtTime(0.0, ctx.currentTime);
  master.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.03);
  master.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 2.8);
  master.connect(ctx.destination);

  // C major chord: C4 261.63, E4 329.63, G4 392.00, C5 523.25
  const freqs = [261.63, 329.63, 392.00, 523.25];
  freqs.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    g.gain.setValueAtTime(0.0, ctx.currentTime);
    g.gain.linearRampToValueAtTime(0.22 - i * 0.02, ctx.currentTime + 0.02 + i * 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 2.5);
    osc.connect(g);
    g.connect(master);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 2.8);
  });

  // Add a subtle overtone shimmer
  const shimmer = ctx.createOscillator();
  const sg = ctx.createGain();
  shimmer.type = 'sine';
  shimmer.frequency.setValueAtTime(1046.50, ctx.currentTime); // C6
  sg.gain.setValueAtTime(0.0, ctx.currentTime);
  sg.gain.linearRampToValueAtTime(0.06, ctx.currentTime + 0.05);
  sg.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
  shimmer.connect(sg);
  sg.connect(master);
  shimmer.start(ctx.currentTime);
  shimmer.stop(ctx.currentTime + 1.8);
}

const img1 = document.getElementById('img1');
const img2 = document.getElementById('img2');
const wrap = document.getElementById('photoWrap');

wrap.addEventListener('click', () => {
  playMacChime();
  if (!isImg2) {
    img1.style.opacity = '0';
    img2.style.opacity = '1';
    isImg2 = true;
    setTimeout(() => {
      img2.style.opacity = '0';
      img1.style.opacity = '1';
      isImg2 = false;
    }, 1800);
  }
  showPhrase();
});
